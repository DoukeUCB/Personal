<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Servicio Web con formulario de contacto y validación de datos para mejorar la experiencia del usuario.">
  <title>Servicio Web - Formulario de Contacto</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
  <h1>Bienvenido</h1>
</header>

<nav aria-label="Navegación principal">
  <a href="#">Inicio</a>
  <a href="#">Servicios</a>
  <a href="#">Contacto</a>
</nav>

<main>
  <h2>Formulario</h2>
  <img src="img/icon.png" alt="Imagen de un formulario" loading="lazy">

  <form id="formulario" novalidate>
    <label for="nombre">Nombre</label>
    <input type="text" id="nombre" placeholder="Nombre" autocomplete="name" aria-describedby="mensaje">

    <label for="correo">Correo</label>
    <input type="email" id="correo" placeholder="Correo" autocomplete="email" aria-describedby="mensaje">

    <button type="submit">Enviar</button>
  </form>

  <p id="mensaje" role="alert" aria-live="polite"></p>
</main>

<script src="js/script.js" defer></script>
</body>
</html>
